<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="refresh" content="0;url=https://www.youtube.com">
  <title>Przekierowanie...</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0a0a;
      color: #fff;
      font-family: 'Space Mono', monospace;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .bg {
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at center, #1a0000 0%, #0a0a0a 70%);
      z-index: 0;
    }

    .scanlines {
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        to bottom,
        transparent 0px,
        transparent 3px,
        rgba(255,0,0,0.03) 3px,
        rgba(255,0,0,0.03) 4px
      );
      z-index: 1;
      pointer-events: none;
    }

    .content {
      position: relative;
      z-index: 2;
      text-align: center;
    }

    .logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(80px, 15vw, 140px);
      letter-spacing: -2px;
      line-height: 1;
      color: #ff0000;
      text-shadow:
        0 0 40px rgba(255,0,0,0.8),
        0 0 80px rgba(255,0,0,0.4),
        4px 4px 0 #8b0000;
      animation: flicker 3s infinite;
    }

    .sub {
      font-size: 11px;
      letter-spacing: 6px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.4);
      margin-top: 8px;
      margin-bottom: 40px;
    }

    .bar-wrap {
      width: 280px;
      height: 3px;
      background: rgba(255,255,255,0.08);
      border-radius: 2px;
      overflow: hidden;
      margin: 0 auto 20px;
    }

    .bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #ff0000, #ff6666);
      border-radius: 2px;
      animation: load 1s cubic-bezier(0.4,0,0.2,1) forwards;
      box-shadow: 0 0 12px rgba(255,0,0,0.8);
    }

    .status {
      font-size: 10px;
      letter-spacing: 3px;
      color: rgba(255,255,255,0.25);
      text-transform: uppercase;
      animation: blink 1s step-end infinite;
    }

    @keyframes load {
      0%   { width: 0% }
      60%  { width: 80% }
      100% { width: 100% }
    }

    @keyframes flicker {
      0%,95%,100% { opacity: 1; }
      96% { opacity: 0.85; }
      97% { opacity: 1; }
      98% { opacity: 0.7; }
      99% { opacity: 1; }
    }

    @keyframes blink {
      0%,100% { opacity: 0.25; }
      50% { opacity: 0.05; }
    }
  </style>
  <script>
    setTimeout(() => { window.location.href = "https://www.youtube.com"; }, 1000);
  </script>
</head>
<body>
  <div class="bg"></div>
  <div class="scanlines"></div>
  <div class="content">
    <div class="logo">YouTube</div>
    <div class="sub">Ładowanie &mdash; proszę czekać</div>
    <div class="bar-wrap"><div class="bar"></div></div>
    <div class="status">przekierowywanie...</div>
  </div>
</body>
</html>
